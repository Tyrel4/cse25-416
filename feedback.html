<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback - BMW M Series</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:#000;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:1000;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:24px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
}

nav a:hover{
color:#1c69d4;
}

/* HERO */
.hero{
height:40vh;
display:flex;
align-items:center;
padding-left:60px;
background:url("https://images.unsplash.com/photo-1617814065893-b0c09a37a1f1") center/contain no-repeat;
background-color:#000;
}

.hero-text{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:8px;
}

.hero h1{
font-size:40px;
}

/* SECTION */
section{
padding:60px;
}

.form-container{
max-width:600px;
margin:auto;
background:#111;
padding:30px;
border-radius:10px;
border:1px solid #222;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
background:#000;
color:white;
border:1px solid #333;
}

input:focus, textarea:focus{
outline:none;
border-color:#1c69d4;
}

/* BUTTON */
button{
background:#1c69d4;
border:none;
color:white;
padding:12px;
width:100%;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

button:hover{
background:#0f4ea8;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
background:#050505;
color:#aaa;
}

/* MOBILE */
@media(max-width:700px){

.hero{
padding-left:20px;
height:30vh;
}

.hero h1{
font-size:28px;
}

section{
padding:30px;
}

}

</style>

<script>

function submitForm(event){
event.preventDefault();
alert("Thank you! Your feedback has been submitted.");
}

</script>

</head>

<body>

<header>

<div class="logo-area">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" class="logo">
<h2>BMW M Series</h2>
</div>

<nav>
<a href="index.html">Home</a>
<a href="m2.html">M2</a>
<a href="m3.html">M3</a>
<a href="m4.html">M4</a>
<a href="m5.html">M5</a>
<a href="m8.html">M8</a>
<a href="about.html">About</a>
<a href="feedback.html">Feedback</a>
</nav>

</header>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>Feedback</h1>
</div>

</section>

<!-- FORM -->
<section>

<div class="form-container">

<h2>Send Us Your Feedback</h2>

<form onsubmit="submitForm(event)">

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea rows="5" placeholder="Your Feedback" required></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

</section>

<footer>

<p>BMW M Series Website</p>

<p>We value your feedback</p>

</footer>

</body>
</html>
